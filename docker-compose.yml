services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: authcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AuthCore!Pass2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=authcore;Username=postgres;Password=AuthCore!Pass2024
      - JwtSettings__Secret=dev-secret-key-not-for-production-must-be-at-least-32-chars
      - JwtSettings__Issuer=AuthCore
      - JwtSettings__Audience=AuthCoreClients
      - JwtSettings__AccessTokenExpirationMinutes=15
      - JwtSettings__RefreshTokenExpirationDays=7
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
